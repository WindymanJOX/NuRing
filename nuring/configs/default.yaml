data:
  image_dir: /data/wzx/TLS/mIF50/registered
  nucleus_dir: /data/wzx/TLS/mIF50/nucleiseg
  cell_dir:
  tissue_dir:
  tissuenet_dir: /data/wzx/tissuenet_v1.1
  sample_list:
  image_suffix: .npy
  nucleus_suffix: .npy
  pseudo_label: dilation
  input_mode: all

model:
  input_channels:
  base_channels: 32
  crop_size: 128
  max_radius: 64
  num_radial_bins: 64
  num_angles: 128

train:
  batch_size: 16
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-5
  num_workers: 4
  device: cuda
  seed: 7
  save_dir: runs/nuring

loss:
  lambda_mask: 1.0
  lambda_radius: 0.05
  lambda_conf: 0.1
  lambda_smooth: 0.005
  lambda_contain: 0.05
  lambda_neighbor: 0.05
  max_radius: 64

label:
  gap_tolerance: 2
  median_filter_size: 5
  min_radius: 3

split:
  mode: image
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0
  seed: 42

infer:
  checkpoint: runs/nuring/best.pt
  output_dir: outputs/nuring
  threshold: 0.5
  fusion_mode: confidence_fusion
  radius_sigma: 2.0
  radius_prior_weight: 0.5
